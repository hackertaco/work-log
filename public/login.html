<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Work Log</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Login-specific layout */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg, #f5f5f5);
    }

    .login-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .login-card h1 {
      font-size: 1.25rem;
      margin: 0 0 1.5rem;
      color: #111;
    }

    .login-card label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #333;
    }

    .login-card input[type="password"] {
      display: block;
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }

    .login-card input[type="password"]:focus {
      outline: none;
      border-color: #555;
    }

    .login-card button {
      display: block;
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .login-card button:hover {
      background: #333;
    }

    .login-card button:disabled {
      background: #888;
      cursor: not-allowed;
    }

    .login-error {
      display: none;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 4px;
      color: #c00;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Work Log — Resume Access</h1>
      <form id="loginForm" autocomplete="off" novalidate>
        <label for="tokenInput">Access token</label>
        <input
          id="tokenInput"
          type="password"
          autocomplete="current-password"
          placeholder="Enter your token"
          required
        />
        <button type="submit" id="submitBtn">Sign in</button>
        <div id="errorMsg" class="login-error" role="alert"></div>
      </form>
    </div>
  </div>

  <script type="module">
    /**
     * Reads the ?next= query param so we can redirect back after login.
     * Falls back to /resume if nothing is specified.
     */
    function getNextPath() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("next");
      if (!raw) return "/resume";
      try {
        const decoded = decodeURIComponent(raw);
        // Only allow relative paths that start with / to prevent open redirect.
        if (decoded.startsWith("/") && !decoded.startsWith("//")) {
          return decoded;
        }
      } catch {
        // Malformed encoding — ignore.
      }
      return "/resume";
    }

    const form = document.getElementById("loginForm");
    const tokenInput = document.getElementById("tokenInput");
    const submitBtn = document.getElementById("submitBtn");
    const errorMsg = document.getElementById("errorMsg");

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = "block";
    }

    function hideError() {
      errorMsg.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();

      const token = tokenInput.value.trim();
      if (!token) {
        showError("Please enter your access token.");
        tokenInput.focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
          credentials: "same-origin"
        });

        if (res.ok) {
          // Cookie is now set — navigate to the originally requested page.
          window.location.href = getNextPath();
          return;
        }

        if (res.status === 401) {
          showError("Invalid token. Please try again.");
        } else {
          const body = await res.json().catch(() => ({}));
          showError(body.error ?? `Unexpected error (${res.status})`);
        }
      } catch (err) {
        showError("Network error. Please check your connection and try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
        tokenInput.select();
      }
    });

    // Auto-focus the token input on page load.
    tokenInput.focus();
  </script>
</body>
</html>
